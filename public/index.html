<!DOCTYPE html>
<html>
<head>
    <title>Agri Export System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Agricultural Export Workflow</h1>

<form id="exportForm">

<script src="script.js"></script>

</body>
</html>
